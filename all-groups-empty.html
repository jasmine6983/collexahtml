<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Groups (Empty) - Collexa</title>
    <link href="./output.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {

<body class="antialiased text-gray-800 bg-[#f8fbff] min-h-screen flex flex-col md:flex-row">

    <!-- LEFT SIDEBAR (Desktop Web) -->
    <aside
        class="hidden md:flex w-64 lg:w-72 flex-col bg-white border-r border-gray-100 min-h-screen p-6 shadow-[4px_0_24px_-10px_rgba(0,0,0,0.03)] z-10 sticky top-0">
        <!-- Brand Logo -->
        <div class="flex items-center space-x-3 mb-12 mt-2 px-2">
            <div class="w-10 h-10">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                    <path d="M50 15 C 70 15, 85 30, 85 50" stroke="#0055ff" stroke-width="7" stroke-linecap="round" />
                    <circle cx="85" cy="50" r="7" fill="#15803d" />
                    <path d="M80 55 C 70 75, 45 85, 25 75" stroke="#15803d" stroke-width="7" stroke-linecap="round" />

                    <circle cx="45" cy="15" r="7" fill="#0055ff" />
                </svg>
            </div>
            <span class="text-2xl font-extrabold tracking-tight text-[#1a202c]">Collexa</span>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 space-y-2">
            <a href="dashboard-active.html"
                class="flex items-center space-x-3 px-4 py-3.5 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-semibold tracking-wide transition-colors">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                    </path>

            <a href="all-groups.html"

            </a>
            <a href="#"
                class="flex items-center space-x-3 px-4 py-3.5 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-semibold tracking-wide transition-colors">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"

            <!-- Header Section -->

                <!-- Back Arrow -->

                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white md:hover:bg-gray-100 transition-colors shrink-0">
                    <svg class="w-6 h-6 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>

                <!-- Title -->

                    class="text-[19px] md:text-3xl font-extrabold text-[#1a202c] tracking-tight text-center flex-1 pr-1 md:text-left transition-all">
                    All groups</h1>

                <!-- Plus Button -->
                <a href="create-group.html"
                    class="w-[38px] h-[38px] flex items-center justify-center rounded-full bg-[#005ef5] hover:bg-blue-700 transition-colors text-white shadow-[0_4px_14px_0_rgba(0,94,245,0.39)] shrink-0 group">

            </header>

            <!-- Empty State Container -->

                        <path d="M60 80 Q 75 75 90 80 L 92 120 L 60 120 Z" fill="#0f172a" />

                        <path d="M63 65 C 63 55, 87 55, 87 65" fill="#1e293b" />

                        <!-- Right Person -->
                        <path d="M150 120 l5 35" stroke="#3b82f6" stroke-width="7" stroke-linecap="round" />
                        <path d="M165 120 l-2 35" stroke="#3b82f6" stroke-width="7" stroke-linecap="round" />
                        <path d="M145 80 Q 155 75 165 80 L 165 120 L 140 120 Z" fill="#1e293b" />
                        <circle cx="155" cy="65" r="10" fill="#fcd34d" />
                        <path d="M145 65 C 145 50, 165 50, 165 65 C 165 75, 145 75, 145 65" fill="#0f172a" />

                        <!-- Center Person -->
                        <path d="M110 115 l-5 40" stroke="#334155" stroke-width="7" stroke-linecap="round" />

                        <path d="M105 75 Q 115 70 125 75 L 125 115 L 105 115 Z" fill="#3b82f6" />
                        <circle cx="115" cy="60" r="11" fill="#78350f" />
                        <circle cx="115" cy="55" r="12" fill="#0f172a" />

                        <path d="M 65 95 L 95 95 L 95 120 L 65 120 Z" fill="#1d4ed8" rx="2" />
                        <circle cx="95" cy="107" r="6" fill="#1d4ed8" />

                        <circle cx="155" cy="107" r="6" fill="#2563eb" />
                        <circle cx="125" cy="107" r="6" fill="#f1f5f9" />
                    </svg>
                </div>

                <!-- Text Info -->
                <h2 class="text-[20px] md:text-2xl font-extrabold text-gray-900 mb-2 md:mb-3 tracking-tight">No Groups

                <p
                    class="text-[13px] md:text-[14.5px] text-gray-500 text-center leading-relaxed font-medium px-4 mb-8 max-w-[280px] md:max-w-sm">

                </p>

                <!-- Actions Array -->
                <div class="w-full max-w-[260px] md:max-w-[320px] flex flex-col space-y-3.5 mb-2">

                    <!-- Create New Group Button -->
                    <a href="create-group.html"
                        class="w-full bg-[#005ef5] hover:bg-blue-700 transform md:hover:scale-[1.02] text-white font-bold py-3.5 md:py-4 px-6 rounded-xl flex items-center justify-center transition-all shadow-[0_4px_14px_0_rgba(0,118,255,0.39)] text-[13.5px] md:text-[14px] tracking-wide focus:ring-4 focus:ring-blue-100 outline-none">
                        <svg class="w-[18px] h-[18px] mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"

                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>

                    <!-- Join Existing Group Button -->
                    <a href="#"

                            </path>

                        Join Existing Group

            <div

        </a>

        <!-- Payment -->

            <div
                class="text-gray-400 rounded-3xl flex items-center justify-center group-hover:text-[#005ef5] transition-colors mt-1">
                <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">

            <div

                <svg class="w-[22px] h-[22px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
