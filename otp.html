<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Collexa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .mobile-bg {
            background: linear-gradient(180deg, #dcf0fe 0%, #cde8fd 100%);
        }

        @media (min-width: 768px) {
            .mobile-bg {
                background: white;
            }
        }

        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="antialiased text-gray-800 bg-white flex min-h-[100dvh] flex-col md:flex-row">

    <!-- LEFT SIDE: Desktop Brand Area -->
    <div
        class="hidden md:flex flex-col justify-between w-1/2 p-12 lg:p-20 bg-gradient-to-br from-[#dcf0fe] to-[#cde8fd] border-r border-[#bae6fd]">
        <div class="w-full pt-10">
            <!-- Brand Logo Desktop -->
            <div class="flex items-center space-x-4 mb-16">
                <div class="w-14 h-14">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                        <path d="M50 15 C 70 15, 85 30, 85 50" stroke="#0055ff" stroke-width="7"
                            stroke-linecap="round" />
                        <circle cx="85" cy="50" r="7" fill="#15803d" />
                        <path d="M80 55 C 70 75, 45 85, 25 75" stroke="#15803d" stroke-width="7"
                            stroke-linecap="round" />
                        <circle cx="25" cy="75" r="7" fill="#f59e0b" />
                        <path d="M20 65 C 10 40, 25 15, 45 15" stroke="#f59e0b" stroke-width="7"
                            stroke-linecap="round" />
                        <circle cx="45" cy="15" r="7" fill="#0055ff" />
                    </svg>
                </div>
                <span class="text-3xl font-extrabold tracking-tight text-[#2d3748]">Collexa</span>
            </div>

            <!-- Value Proposition -->
            <h2 class="text-4xl lg:text-5xl font-extrabold text-gray-900 mb-6 leading-[1.15]">Secure your<br>account.
            </h2>
            <p class="text-[17px] lg:text-lg text-gray-600 font-medium max-w-md leading-relaxed">We've sent a
                verification code to your number to ensure your shared expenses stay safe and private.</p>
        </div>

        <div class="w-full pb-6">
            <p class="text-sm font-medium text-gray-400">© 2026 Collexa Inc. All rights reserved.</p>
        </div>
    </div>

    <!-- RIGHT SIDE: Form Area -->
    <div class="flex-1 flex w-full md:w-1/2 mobile-bg min-h-[100dvh] overflow-y-auto">
        <div class="w-full max-w-[380px] mx-auto p-6 sm:p-8 flex flex-col justify-center min-h-full">

            <!-- Mobile Logo Area -->
            <div class="md:hidden mt-8 mb-14 flex flex-col items-center justify-center">
                <div class="w-16 h-16 relative mb-4">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 15 C 70 15, 85 30, 85 50" stroke="#0055ff" stroke-width="7"
                            stroke-linecap="round" />
                        <circle cx="85" cy="50" r="7" fill="#15803d" />
                        <path d="M80 55 C 70 75, 45 85, 25 75" stroke="#15803d" stroke-width="7"
                            stroke-linecap="round" />
                        <circle cx="25" cy="75" r="7" fill="#f59e0b" />
                        <path d="M20 65 C 10 40, 25 15, 45 15" stroke="#f59e0b" stroke-width="7"
                            stroke-linecap="round" />
                        <circle cx="45" cy="15" r="7" fill="#0055ff" />
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight text-[#2d3748]">Collexa</h1>
            </div>

            <form id="otp-form" class="flex flex-col flex-1 pb-8" action="#" method="POST">
                <div class="mb-6">
                    <!-- Label and Resend -->
                    <div class="flex justify-between items-end mb-3 px-1">
                        <label class="block text-[14px] md:text-[15px] font-bold text-[#2d3748]" for="otp-1">OTP</label>
                        <button type="button"
                            class="text-[#005ef5] font-bold text-[12.5px] hover:text-blue-700 hover:underline tracking-wide uppercase transition-colors">RESEND</button>
                    </div>

                    <!-- 4 Digit Inputs -->
                    <div class="flex space-x-3 md:space-x-4">
                        <input type="number" id="otp-1" maxlength="1" placeholder="0"
                            class="w-1/4 aspect-square text-center text-[22px] md:text-2xl font-semibold rounded-md border border-transparent shadow-sm md:border-gray-200 md:shadow-none bg-white md:bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#005ef5] focus:border-transparent transition-all placeholder-gray-300 text-[#2d3748]">
                        <input type="number" id="otp-2" maxlength="1" placeholder="0"
                            class="w-1/4 aspect-square text-center text-[22px] md:text-2xl font-semibold rounded-md border border-transparent shadow-sm md:border-gray-200 md:shadow-none bg-white md:bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#005ef5] focus:border-transparent transition-all placeholder-gray-300 text-[#2d3748]">
                        <input type="number" id="otp-3" maxlength="1" placeholder="0"
                            class="w-1/4 aspect-square text-center text-[22px] md:text-2xl font-semibold rounded-md border border-transparent shadow-sm md:border-gray-200 md:shadow-none bg-white md:bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#005ef5] focus:border-transparent transition-all placeholder-gray-300 text-[#2d3748]">
                        <input type="number" id="otp-4" maxlength="1" placeholder="0"
                            class="w-1/4 aspect-square text-center text-[22px] md:text-2xl font-semibold rounded-md border border-transparent shadow-sm md:border-gray-200 md:shadow-none bg-white md:bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#005ef5] focus:border-transparent transition-all placeholder-gray-300 text-[#2d3748]">
                    </div>
                </div>

                <button type="submit" id="continue-btn" disabled
                    class="w-full bg-[#93c5fd] cursor-not-allowed hover:bg-[#93c5fd] text-white font-semibold py-3.5 md:py-4 px-4 rounded-md flex items-center justify-center transition-colors text-[14.5px] md:text-[15px] shadow-sm">
                    Continue
                    <svg class="w-4 h-4 md:w-5 md:h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>

                <div class="mt-8 mb-6 flex items-center w-full opacity-80">
                    <div class="h-[1px] bg-gray-300 flex-1"></div>
                    <span class="px-4 text-[11px] tracking-wider text-gray-400 font-bold uppercase">OR</span>
                    <div class="h-[1px] bg-gray-300 flex-1"></div>
                </div>

                <div class="text-center md:text-left text-[14px] md:text-[14.5px] mb-8">
                    <span class="text-gray-500 font-medium">New to Collexa?</span>
                    <a href="register.html" class="text-[#005ef5] font-bold hover:underline">Create an account</a>
                </div>

                <div class="mt-auto text-center md:text-left pt-6">
                    <p
                        class="text-[10.5px] md:text-[12px] text-gray-400 leading-relaxed max-w-[220px] md:max-w-full mx-auto md:mx-0 font-medium">
                        By signing up, you agree to our <a href="#" class="hover:underline text-gray-500">Terms of
                            Service</a> and <a href="#" class="hover:underline text-gray-500">Privacy Policy</a>.
                    </p>
                </div>
            </form>
        </div>
    </div>

    <!-- Script to handle the OTP verification functionality -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('otp-form');
            const inputs = document.querySelectorAll('input[type="number"]');
            const continueBtn = document.getElementById('continue-btn');

            // Expected validation code on server side (mocked here for static presentation)
            const MOCK_SERVER_CODE = "1234";

            // Toggles button enabled state
            const checkIfFilled = () => {
                const allFilled = Array.from(inputs).every(input => input.value.length === 1);
                if (allFilled) {
                    continueBtn.disabled = false;
                    continueBtn.classList.remove('bg-[#93c5fd]', 'cursor-not-allowed', 'hover:bg-[#93c5fd]');
                    continueBtn.classList.add('bg-[#005ef5]', 'hover:bg-blue-700');
                } else {
                    continueBtn.disabled = true;
                    continueBtn.classList.add('bg-[#93c5fd]', 'cursor-not-allowed', 'hover:bg-[#93c5fd]');
                    continueBtn.classList.remove('bg-[#005ef5]', 'hover:bg-blue-700');
                }
            };

            // Clean up error states if typing again
            const resetErrorStates = () => {
                inputs.forEach(input => {
                    input.classList.remove('border-red-500', 'focus:ring-red-500', 'text-red-500');
                    input.classList.add('border-transparent', 'md:border-gray-200', 'focus:ring-[#005ef5]');
                });
            };

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    resetErrorStates();

                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }

                    if (e.target.value !== '' && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }

                    checkIfFilled();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        inputs[index - 1].focus();
                        resetErrorStates();
                    }
                });

                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    resetErrorStates();

                    const pastedData = e.clipboardData.getData('text/plain').slice(0, inputs.length);
                    if (!/^\d+$/.test(pastedData)) return;

                    [...pastedData].forEach((char, i) => {
                        if (index + i < inputs.length) {
                            inputs[index + i].value = char;
                            if (index + i < inputs.length - 1) {
                                inputs[index + i + 1].focus();
                            }
                        }
                    });

                    checkIfFilled();
                });
            });

            // Handle submission logic
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const enteredCode = Array.from(inputs).map(input => input.value).join('');
                const originalText = continueBtn.innerHTML;

                // Show loading state
                continueBtn.disabled = true;
                continueBtn.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 md:h-5 md:w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Verifying...
                `;

                // Simulate Mock API Request Delay
                setTimeout(() => {
                    if (enteredCode === MOCK_SERVER_CODE) {
                        // Success Redirect to Dashboard
                        window.location.href = 'dashboard.html';
                    } else {
                        // Error UX
                        inputs.forEach(input => {
                            input.classList.remove('border-transparent', 'md:border-gray-200', 'focus:ring-[#005ef5]');
                            input.classList.add('border-red-500', 'focus:ring-red-500', 'text-red-500');
                            input.value = '';
                        });
                        inputs[0].focus();
                        checkIfFilled();

                        // Small browser alert to inform about the demo limitation
                        setTimeout(() => alert("Invalid OTP! Try using '1234' for this demo."), 10);

                        continueBtn.innerHTML = originalText;
                        continueBtn.disabled = true;
                    }
                }, 1200); // 1.2s fake verify time
            });
        });
    </script>
</body>

</html>
