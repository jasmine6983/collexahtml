<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Group - Collexa</title>
    <link href="./output.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .zoom-in-animation {
            animation: zoomIn 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="antialiased text-gray-800 bg-gray-50 min-h-screen flex justify-center">

    <main class="w-full max-w-[480px] bg-white min-h-screen flex flex-col relative shadow-sm">

        <!-- Header -->
        <header class="flex items-center px-5 py-4 border-b border-gray-50">
            <a href="javascript:history.back()" class="p-2 -ml-2 rounded-full hover:bg-gray-50 transition-colors">
                <svg class="w-5 h-5 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
            </a>
            <h1 class="flex-1 text-center text-[16px] font-extrabold pr-8">Create Group</h1>
        </header>

        <!-- Main Content -->
        <div class="flex-1 overflow-y-auto px-6 py-6 pb-24 space-y-7">

            <!-- Group Name Section -->
            <div>
                <label class="block text-[13px] font-extrabold text-gray-900 mb-2 tracking-wide">Group Name</label>
                <div
                    class="flex items-center border border-gray-200 rounded-xl px-4 py-3.5 focus-within:border-[#005ef5] focus-within:ring-1 focus-within:ring-[#005ef5] transition-all bg-white">
                    <input type="text"
                        class="w-full bg-transparent outline-none text-[15px] font-semibold text-gray-900 placeholder-gray-400"
                        placeholder="Summer Road Trip">
                </div>
            </div>

            <!-- Invite Members Section -->
            <div>
                <label class="block text-[13px] font-extrabold text-gray-900 mb-3 tracking-wide">Invite Members</label>
                <div id="members-list"
                    class="flex items-start space-x-4 overflow-x-auto hide-scrollbar pb-2 pt-1 px-1 -mx-1">

                    <!-- Add Button -->
                    <div class="flex flex-col items-center shrink-0">
                        <button onclick="openSearchMemberModal()"
                            class="w-[52px] h-[52px] rounded-full border-[1.5px] border-dashed border-[#005ef5] flex items-center justify-center hover:bg-blue-50 transition-colors relative mb-2 cursor-pointer">
                            <svg class="w-5 h-5 text-[#005ef5]" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                            </svg>
                        </button>
                        <span class="text-[10px] font-bold text-gray-800">Add</span>
                    </div>

                    <!-- Member 1: Alex -->
                    <div class="flex flex-col items-center">
                        <div
                            class="w-[52px] h-[52px] rounded-full border border-gray-100 bg-[#ffebd6] flex items-center justify-center p-0.5 relative mb-2 shadow-sm hover:scale-110 hover:shadow-md transition-all cursor-pointer hover:border-blue-200 group">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex&backgroundColor=transparent"
                                alt="Alex" class="w-full h-full object-cover rounded-full">
                            <div
                                class="absolute -bottom-1 bg-[#005ef5] text-white text-[7px] font-extrabold px-2 py-0.5 rounded-full border-[1.5px] border-white">
                                PRO
                            </div>
                        </div>
                        <span class="text-[10px] font-semibold text-gray-600">Alex</span>
                    </div>

                    <!-- Member 2: Sarah -->
                    <div class="flex flex-col items-center">
                        <div
                            class="w-[52px] h-[52px] rounded-full border border-gray-100 bg-[#ffe5e5] flex items-center justify-center p-0.5 relative mb-2 shadow-sm hover:scale-110 hover:shadow-md transition-all cursor-pointer hover:border-blue-200 group">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah&backgroundColor=transparent"
                                alt="Sarah" class="w-full h-full object-cover rounded-full">
                            <div
                                class="absolute -bottom-1 bg-[#005ef5] text-white text-[7px] font-extrabold px-2 py-0.5 rounded-full border-[1.5px] border-white">
                                PRO
                            </div>
                        </div>
                        <span class="text-[10px] font-semibold text-gray-600">Sarah</span>
                    </div>

                    <!-- Member 3: Mike -->
                    <div class="flex flex-col items-center">
                        <div
                            class="w-[52px] h-[52px] rounded-full border border-gray-100 bg-[#e5f0ff] flex items-center justify-center p-0.5 relative mb-2 shadow-sm hover:scale-110 hover:shadow-md transition-all cursor-pointer hover:border-blue-200 group">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mike&backgroundColor=transparent"
                                alt="Mike" class="w-full h-full object-cover rounded-full">
                            <div
                                class="absolute -bottom-1 bg-[#005ef5] text-white text-[7px] font-extrabold px-2 py-0.5 rounded-full border-[1.5px] border-white">
                                PRO
                            </div>
                        </div>
                        <span class="text-[10px] font-semibold text-gray-600">Mike</span>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <!-- Approval Required Toggle -->
                <div class="bg-[#f5f8ff] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-start space-x-3">
                        <div
                            class="mt-0.5 w-[22px] h-[22px] rounded-full bg-[#005ef5] flex items-center justify-center shrink-0">
                            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"></path>
                            </svg>
                        </div>
                        <div>
                            <h4 class="text-[13.5px] font-extrabold text-gray-900 leading-none mb-1.5">Approval Required
                            </h4>
                            <p class="text-[11px] font-medium text-gray-400 leading-tight pr-2">Approve members before
                                they join</p>
                        </div>
                    </div>
                    <!-- Toggle Active -->
                    <div id="approval-toggle" onclick="toggleApproval()"
                        class="w-11 h-6 bg-[#005ef5] rounded-full relative cursor-pointer ml-3 shrink-0 transition-colors duration-300">
                        <div id="approval-indicator"
                            class="w-5 h-5 bg-white rounded-full absolute top-0.5 right-0.5 shadow-sm transition-all duration-300">
                        </div>
                    </div>
                </div>

                <!-- Privacy Toggle -->
                <div class="bg-[#f5f8ff] rounded-2xl p-4 flex items-center justify-between">
                    <div class="flex items-start space-x-3">
                        <div
                            class="mt-0.5 w-[22px] h-[22px] rounded-full bg-[#005ef5] flex items-center justify-center shrink-0">
                            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </div>
                        <div>
                            <h4 class="text-[13.5px] font-extrabold text-gray-900 leading-none mb-1.5">Privacy</h4>
                            <p class="text-[11px] font-medium text-gray-400 leading-tight pr-2">Private lists (e.g.
                                Rent) are only visible to the admin.</p>
                        </div>
                    </div>
                    <!-- Toggle Active -->
                    <div id="privacy-toggle" onclick="togglePrivacy()"
                        class="w-11 h-6 bg-[#005ef5] rounded-full relative cursor-pointer ml-3 shrink-0 transition-colors duration-300">
                        <div id="privacy-indicator"
                            class="w-5 h-5 bg-white rounded-full absolute top-0.5 right-0.5 shadow-sm transition-all duration-300">
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Sticky Bottom Button -->
        <div class="absolute bottom-0 w-full bg-white border-t border-gray-50 px-6 py-5">
            <a href="dashboard-active.html"><button
                    class="w-full bg-[#005ef5] hover:bg-blue-700 active:scale-[0.98] transition-all text-white font-bold py-4 rounded-xl text-[14.5px] shadow-[0_8px_20px_-6px_rgba(0,94,245,0.4)]">
                    Create Group
                </button></a>
        </div>

        <!-- Grey Overlay -->
        <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-[100] hidden transition-opacity opacity-0"
            onclick="closeModal()"></div>

        <!-- Search Member Modal -->
        <div id="search-member-modal"
            class="fixed bottom-0 left-0 right-0 w-full max-w-[480px] mx-auto bg-white rounded-t-3xl z-[101] transform translate-y-full transition-transform duration-300 pb-8 px-6 pt-3 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <!-- Drag handle -->
            <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>

            <!-- Close Button -->
            <button onclick="closeModal()"
                class="absolute top-5 right-5 text-gray-400 hover:text-gray-600 transition-colors cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>

            <h3 class="text-[19px] font-extrabold text-[#1a202c] mb-1">Add Member</h3>
            <p class="text-[13px] font-medium text-gray-500 mb-6">Search for registered users to add</p>

            <!-- Search Input -->
            <div class="relative mb-6">
                <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="member-search-input" placeholder="Search by name or email"
                    class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-xl text-[14px] font-semibold text-gray-900 focus:bg-white focus:border-[#005ef5] focus:ring-1 focus:ring-[#005ef5] outline-none transition-all">
            </div>

            <!-- Registered Users List -->
            <div class="space-y-4 max-h-[260px] overflow-y-auto pr-2 hide-scrollbar">

                <!-- User 1 -->
                <div class="flex items-center justify-between group">
                    <div class="flex items-center space-x-3">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jessica&backgroundColor=transparent"
                            alt="User" class="w-10 h-10 rounded-full bg-pink-50 border border-gray-100 object-cover">
                        <div>
                            <h4 class="text-[14px] font-bold text-gray-900 leading-tight">Jessica Alba</h4>
                            <p class="text-[11px] font-semibold text-gray-400">jessica@example.com</p>
                        </div>
                    </div>
                    <button
                        onclick="addMemberToFront('Jessica', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Jessica&backgroundColor=transparent', this)"
                        class="px-5 py-2 bg-[#005ef5] text-white text-[12px] font-bold rounded-lg hover:bg-blue-700 transition-colors shadow-sm cursor-pointer">
                        Add
                    </button>
                </div>

                <!-- User 2 -->
                <div class="flex items-center justify-between group">
                    <div class="flex items-center space-x-3">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=transparent"
                            alt="User" class="w-10 h-10 rounded-full bg-blue-50 border border-gray-100 object-cover">
                        <div>
                            <h4 class="text-[14px] font-bold text-gray-900 leading-tight">Felix Doe</h4>
                            <p class="text-[11px] font-semibold text-gray-400">felix.doe@example.com</p>
                        </div>
                    </div>
                    <button
                        onclick="addMemberToFront('Felix', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=transparent', this)"
                        class="px-5 py-2 bg-[#005ef5] text-white text-[12px] font-bold rounded-lg hover:bg-blue-700 transition-colors shadow-sm cursor-pointer">
                        Add
                    </button>
                </div>

            </div>
        </div>

    </main>

    <script>
        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const searchModal = document.getElementById('search-member-modal');

            overlay.classList.add('opacity-0');
            if (searchModal) searchModal.classList.add('translate-y-full');

            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        function openSearchMemberModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('search-member-modal');

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('translate-y-full');
            }, 10);
        }

        function addMemberToFront(name, avatarUrl, btn) {
            // Change button to "Added" state
            btn.innerText = 'Added';
            btn.classList.remove('bg-[#005ef5]', 'text-white', 'hover:bg-blue-700', 'cursor-pointer', 'shadow-sm');
            btn.classList.add('bg-[#f0f5ff]', 'text-[#005ef5]', 'cursor-default', 'border', 'border-transparent');
            btn.removeAttribute('onclick');

            // Add member to horizontal scroll list
            const membersList = document.getElementById('members-list');

            const memberHtml = `
                    <div class="flex flex-col items-center shrink-0 zoom-in-animation">
                        <div
                            class="w-[52px] h-[52px] rounded-full border border-gray-100 bg-gray-50 flex items-center justify-center p-0.5 relative mb-2 shadow-sm hover:scale-110 hover:shadow-md transition-all cursor-pointer hover:border-blue-200 group">
                            <img src="${avatarUrl}" alt="${name}" class="w-full h-full object-cover rounded-full">
                        </div>
                        <span class="text-[10px] font-semibold text-gray-600">${name}</span>
                    </div>
            `;

            membersList.insertAdjacentHTML('beforeend', memberHtml);

            // Close modal after short delay automatically
            setTimeout(() => {
                closeModal();
            }, 500);
        }

        let isApprovalRequired = true;
        function toggleApproval() {
            isApprovalRequired = !isApprovalRequired;
            const toggleWrapper = document.getElementById('approval-toggle');
            const indicator = document.getElementById('approval-indicator');

            if (isApprovalRequired) {
                toggleWrapper.classList.remove('bg-gray-200');
                toggleWrapper.classList.add('bg-[#005ef5]');
                indicator.classList.remove('left-0.5');
                indicator.classList.add('right-0.5');
            } else {
                toggleWrapper.classList.remove('bg-[#005ef5]');
                toggleWrapper.classList.add('bg-gray-200');
                indicator.classList.remove('right-0.5');
                indicator.classList.add('left-0.5');
            }
        }

        let isPrivacyEnabled = true;
        function togglePrivacy() {
            isPrivacyEnabled = !isPrivacyEnabled;
            const toggleWrapper = document.getElementById('privacy-toggle');
            const indicator = document.getElementById('privacy-indicator');

            if (isPrivacyEnabled) {
                toggleWrapper.classList.remove('bg-gray-200');
                toggleWrapper.classList.add('bg-[#005ef5]');
                indicator.classList.remove('left-0.5');
                indicator.classList.add('right-0.5');
            } else {
                toggleWrapper.classList.remove('bg-[#005ef5]');
                toggleWrapper.classList.add('bg-gray-200');
                indicator.classList.remove('right-0.5');
                indicator.classList.add('left-0.5');
            }
        }
    </script>
</body>

</html>
