<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Collexa</title>
    <link href="./output.css" rel="stylesheet">

    

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        /* Hide scrollbar for horizontal scroll */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="antialiased text-gray-800 bg-gray-50 min-h-screen flex justify-center">

    <!-- Mobile Container -->
    <main class="w-full max-w-[480px] bg-white min-h-screen flex flex-col relative shadow-sm">

        <!-- Header -->
        <header class="flex items-center px-5 py-4 border-b border-gray-50">
            <a href="dashboard-active.html" class="p-2 -ml-2 rounded-full hover:bg-gray-50 transition-colors">
                <svg class="w-5 h-5 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
            </a>
            <h1 class="flex-1 text-center text-[16px] font-extrabold pr-8">Add Expenses</h1>
        </header>

        <!-- Main Content -->
        <div class="flex-1 overflow-y-auto px-6 py-6 pb-24 space-y-6">

            <!-- Amount Section -->
            <div>
                <label class="block text-[13px] font-extrabold text-gray-900 mb-2 tracking-wide">Amount</label>
                <div
                    class="flex items-center space-x-3 border border-gray-200 rounded-xl px-4 py-3.5 focus-within:border-[#005ef5] focus-within:ring-1 focus-within:ring-[#005ef5] transition-all">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="2">
                        <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                        <circle cx="12" cy="12" r="2"></circle>
                        <path d="M6 12h.01M18 12h.01"></path>
                    </svg>
                    <!-- Input field -->
                    <input type="text" value="₹300"
                        class="w-full bg-transparent outline-none text-[15px] font-semibold text-gray-900 placeholder-gray-400"
                        placeholder="Enter amount">
                </div>
            </div>

            <!-- Due Date Section -->
            <div>
                <label class="block text-[13px] font-extrabold text-gray-900 mb-2 tracking-wide">Due Date</label>
                <div
                    class="flex items-center space-x-3 border border-gray-200 rounded-xl px-4 py-3.5 focus-within:border-[#005ef5] focus-within:ring-1 focus-within:ring-[#005ef5] transition-all">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                        <path d="M12 14v4M10 16h4" stroke-linecap="round"></path>
                    </svg>
                    <!-- Input field -->
                    <input type="date" value="2026-10-22"
                        class="w-full bg-transparent outline-none text-[15px] font-semibold text-gray-900 placeholder-gray-400"
                        placeholder="DD-MM-YYYY">
                </div>
            </div>

            <!-- Split Type Section -->
            <div>
                <label class="block text-[13px] font-extrabold text-gray-900 mb-2 tracking-wide">Split Type</label>
                <div class="grid grid-cols-3 gap-3">
                    <!-- Equal (Active) -->
                    <button
                        class="split-btn active flex flex-col items-center justify-center border-[1.5px] border-[#005ef5] bg-[#f0f5ff] rounded-2xl py-3 transition-all"
                        onclick="setSplitType(this)">
                        <svg class="w-6 h-6 text-[#005ef5] mb-1.5 svg-icon transition-colors" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                            </path>
                        </svg>
                        <span class="text-[11.5px] font-bold text-[#005ef5] btn-text transition-colors">Equal</span>
                    </button>
                    <!-- Per Head -->
                    <button
                        class="split-btn flex flex-col items-center justify-center border-[1.5px] border-gray-100 rounded-2xl py-3 hover:bg-gray-50 transition-all"
                        onclick="setSplitType(this)">
                        <svg class="w-6 h-6 text-gray-500 mb-1.5 svg-icon transition-colors" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span class="text-[11.5px] font-semibold text-gray-500 btn-text transition-colors">Per
                            Head</span>
                    </button>
                    <!-- Custom -->
                    <button
                        class="split-btn flex flex-col items-center justify-center border-[1.5px] border-gray-100 rounded-2xl py-3 hover:bg-gray-50 transition-all"
                        onclick="setSplitType(this)">
                        <svg class="w-6 h-6 text-gray-500 mb-1.5 svg-icon transition-colors" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
                            </path>
                        </svg>
                        <span class="text-[11.5px] font-semibold text-gray-500 btn-text transition-colors">Custom</span>
                    </button>
                </div>
            </div>

            <!-- Approval Required Toggle -->
            <div class="bg-[#f5f8ff] rounded-2xl p-4 flex items-center justify-between">
                <div class="flex items-start space-x-3">
                    <div
                        class="mt-0.5 w-[22px] h-[22px] rounded-full bg-[#005ef5] flex items-center justify-center shrink-0">
                        <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"></path>
                        </svg>
                    </div>
                    <div>
                        <h4 class="text-[13.5px] font-extrabold text-gray-900 leading-none mb-1.5">Approval Required
                        </h4>
                        <p class="text-[11px] font-medium text-gray-400 leading-tight">Approve members before they join
                        </p>
                    </div>
                </div>
                <!-- Toggle Active -->
                <div id="approval-toggle" onclick="toggleApproval()"
                    class="w-11 h-6 bg-[#005ef5] rounded-full relative cursor-pointer ml-3 shrink-0 transition-colors duration-300">
                    <div id="approval-indicator"
                        class="w-5 h-5 bg-white rounded-full absolute top-0.5 right-0.5 shadow-sm transition-all duration-300">
                    </div>
                </div>
            </div>

            <!-- Invite Members Section -->
            <div>
                <label class="block text-[13px] font-extrabold text-gray-900 mb-3 tracking-wide">Invite Members</label>
                <div class="flex items-start space-x-4 overflow-x-auto hide-scrollbar pb-2 pt-1 px-1 -mx-1">

                    <!-- Add Button -->
                    <div class="flex flex-col items-center">
                        <button
                            class="w-[52px] h-[52px] rounded-full border-[1.5px] border-dashed border-[#005ef5] flex items-center justify-center hover:bg-blue-50 transition-colors relative mb-2">
                            <svg class="w-5 h-5 text-[#005ef5]" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                            </svg>
                        </button>
                        <span class="text-[10px] font-bold text-gray-800">Add</span>
                    </div>

                    <!-- Member 1: Alex -->
                    <div class="flex flex-col items-center">
                        <div onclick="handleMemberClick('Alex', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Alex&backgroundColor=transparent')"
                            class="w-[52px] h-[52px] rounded-full border border-gray-100 bg-[#ffebd6] flex items-center justify-center p-0.5 relative mb-2 shadow-sm hover:scale-110 hover:shadow-md transition-all cursor-pointer hover:border-blue-200 group">
                            <!-- Avatar placeholder (Alex) -->
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex&backgroundColor=transparent"
                                alt="Alex" class="w-full h-full object-cover rounded-full">
                            <!-- Blue Badge -->
                            <div
                                class="absolute -bottom-1 bg-[#005ef5] text-white text-[7px] font-extrabold px-2 py-0.5 rounded-full border-[1.5px] border-white">
                                PRO
                            </div>
                        </div>
                        <span class="text-[10px] font-semibold text-gray-600">Alex</span>
                    </div>

                    <!-- Member 2: Sarah -->
                    <div class="flex flex-col items-center">
                        <div onclick="handleMemberClick('Sarah', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah&backgroundColor=transparent')"
                            class="w-[52px] h-[52px] rounded-full border border-gray-100 bg-[#ffe5e5] flex items-center justify-center p-0.5 relative mb-2 shadow-sm hover:scale-110 hover:shadow-md transition-all cursor-pointer hover:border-blue-200 group">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah&backgroundColor=transparent"
                                alt="Sarah" class="w-full h-full object-cover rounded-full">
                            <div
                                class="absolute -bottom-1 bg-[#005ef5] text-white text-[7px] font-extrabold px-2 py-0.5 rounded-full border-[1.5px] border-white">
                                PRO
                            </div>
                        </div>
                        <span class="text-[10px] font-semibold text-gray-600">Sarah</span>
                    </div>

                    <!-- Member 3: Mike -->
                    <div class="flex flex-col items-center">
                        <div onclick="handleMemberClick('Mike', 'https://api.dicebear.com/7.x/avataaars/svg?seed=Mike&backgroundColor=transparent')"
                            class="w-[52px] h-[52px] rounded-full border border-gray-100 bg-[#e5f0ff] flex items-center justify-center p-0.5 relative mb-2 shadow-sm hover:scale-110 hover:shadow-md transition-all cursor-pointer hover:border-blue-200 group">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mike&backgroundColor=transparent"
                                alt="Mike" class="w-full h-full object-cover rounded-full">
                            <div
                                class="absolute -bottom-1 bg-[#005ef5] text-white text-[7px] font-extrabold px-2 py-0.5 rounded-full border-[1.5px] border-white">
                                PRO
                            </div>
                        </div>
                        <span class="text-[10px] font-semibold text-gray-600">Mike</span>
                    </div>

                </div>
            </div>

        </div>

        <!-- Sticky Bottom Button -->
        <div class="absolute bottom-0 w-full bg-white border-t border-gray-50 px-6 py-5">
            <button
                class="w-full bg-[#005ef5] hover:bg-blue-700 active:scale-[0.98] transition-all text-white font-bold py-4 rounded-xl text-[14.5px] shadow-[0_8px_20px_-6px_rgba(0,94,245,0.4)]">
                Add Expense
            </button>
        </div>

        <!-- Grey Overlay -->
        <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-[100] hidden transition-opacity opacity-0"
            onclick="closeModal()"></div>

        <!-- Bottom Sheet Modal -->
        <div id="custom-split-modal"
            class="fixed bottom-0 left-0 right-0 w-full max-w-[480px] mx-auto bg-white rounded-t-3xl z-[101] transform translate-y-full transition-transform duration-300 pb-8 px-6 pt-3 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <!-- Drag handle -->
            <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>

            <!-- Close Button -->
            <button onclick="closeModal()"
                class="absolute top-5 right-5 text-gray-400 hover:text-gray-600 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>

            <!-- Member Profile -->
            <div class="flex flex-col items-center mt-2 mb-6">
                <div class="w-[60px] h-[60px] rounded-2xl overflow-hidden shadow-sm mb-3 border border-gray-100">
                    <img id="modal-member-avatar" src="" alt="Member" class="w-full h-full object-cover">
                </div>
                <h3 id="modal-member-name" class="text-[17px] font-extrabold text-gray-900 mb-0.5">Name</h3>
                <p class="text-[11px] font-semibold text-gray-400">Adjust split amount</p>
            </div>

            <!-- Input Field -->
            <div class="mb-7">
                <div
                    class="flex items-center border border-gray-200 rounded-xl px-4 py-3.5 focus-within:border-[#005ef5] focus-within:ring-1 focus-within:ring-[#005ef5] transition-all bg-white relative">
                    <svg class="w-5 h-5 text-gray-400 absolute left-4" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24" stroke-width="2">
                        <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                        <circle cx="12" cy="12" r="2"></circle>
                        <path d="M6 12h.01M18 12h.01"></path>
                    </svg>
                    <input id="modal-amount-input" type="number"
                        class="w-full bg-transparent outline-none text-[16px] font-bold text-[#005ef5] text-center pl-8 pr-4"
                        placeholder="Enter amount">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex space-x-3">
                <button onclick="closeModal()"
                    class="flex-1 py-3.5 rounded-xl border border-gray-200 text-gray-700 font-bold text-[14px] hover:bg-gray-50 transition-colors shadow-sm">Cancel</button>
                <button onclick="closeModal()"
                    class="flex-1 py-3.5 rounded-xl bg-[#005ef5] text-white font-bold text-[14px] hover:bg-blue-700 transition-colors shadow-[0_4px_14px_rgba(0,94,245,0.3)]">Save</button>
            </div>
        </div>

    </main>

    <script>
        let currentSplitType = 'Equal';

        function handleMemberClick(name, avatarUrl) {
            if (currentSplitType === 'Custom') {
                openModal(name, avatarUrl);
            }
        }

        function openModal(name, avatarUrl) {
            document.getElementById('modal-member-name').innerText = name;
            document.getElementById('modal-member-avatar').src = avatarUrl;
            document.getElementById('modal-amount-input').value = ''; // clear previous

            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('custom-split-modal');

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('translate-y-full');
            }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('custom-split-modal');

            overlay.classList.add('opacity-0');
            modal.classList.add('translate-y-full');

            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        function setSplitType(selectedButton) {
            currentSplitType = selectedButton.querySelector('.btn-text').textContent.trim();

            const buttons = document.querySelectorAll('.split-btn');

            buttons.forEach(btn => {
                // Remove active styling from all buttons
                btn.classList.remove('border-[#005ef5]', 'bg-[#f0f5ff]', 'active');
                btn.classList.add('border-gray-100');

                // Reset SVG colors and text colors
                const svg = btn.querySelector('.svg-icon');
                const text = btn.querySelector('.btn-text');

                svg.classList.remove('text-[#005ef5]');
                svg.classList.add('text-gray-500');

                text.classList.remove('text-[#005ef5]', 'font-bold');
                text.classList.add('text-gray-500', 'font-semibold');
            });

            // Add active styling to the clicked button
            selectedButton.classList.remove('border-gray-100');
            selectedButton.classList.add('border-[#005ef5]', 'bg-[#f0f5ff]', 'active');

            const selectedSvg = selectedButton.querySelector('.svg-icon');
            const selectedText = selectedButton.querySelector('.btn-text');

            selectedSvg.classList.remove('text-gray-500');
            selectedSvg.classList.add('text-[#005ef5]');

            selectedText.classList.remove('text-gray-500', 'font-semibold');
            selectedText.classList.add('text-[#005ef5]', 'font-bold');
        }

        let isApprovalRequired = true;
        function toggleApproval() {
            isApprovalRequired = !isApprovalRequired;
            const toggleWrapper = document.getElementById('approval-toggle');
            const indicator = document.getElementById('approval-indicator');

            if (isApprovalRequired) {
                toggleWrapper.classList.remove('bg-gray-200');
                toggleWrapper.classList.add('bg-[#005ef5]');
                indicator.classList.remove('left-0.5');
                indicator.classList.add('right-0.5');
            } else {
                toggleWrapper.classList.remove('bg-[#005ef5]');
                toggleWrapper.classList.add('bg-gray-200');
                indicator.classList.remove('right-0.5');
                indicator.classList.add('left-0.5');
            }
        }
    </script>
</body>

</html>
